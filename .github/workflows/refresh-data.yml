# .github/workflows/refresh-data.yml
#
# Rafraîchit data/invaders.json depuis la source communautaire goguelnikov/SpaceInvaders.
#
# Déclencheurs :
#   - Planifié : tous les lundis à 6h UTC
#   - Manuel   : onglet "Actions" du repo → "Run workflow"
#
# Ce que fait l'Action :
#   1. Exécute scripts/build_invaders.mjs
#   2. Si le fichier data/invaders.json a changé → commit + push automatique
#   3. Sinon → rien (pas de commit inutile)
#
# Comment relancer manuellement :
#   Sur GitHub : onglet Actions → "Rafraîchissement des données Invaders" → "Run workflow"

name: Rafraîchissement des données Invaders

on:
  schedule:
    # Tous les jours à 6h UTC (heure creuse)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Déclenchement manuel possible depuis l'onglet Actions

jobs:
  refresh:
    name: Mise à jour data/invaders.json
    runs-on: ubuntu-latest

    permissions:
      contents: write   # nécessaire pour le commit automatique

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Exécution du script de build
        run: node scripts/build_invaders.mjs

      - name: Commit si données modifiées
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/index.json data/invaders_*.json
          if git diff --cached --quiet; then
            echo "Aucun changement détecté dans les données — pas de commit."
          else
            git commit -m "data: mise à jour automatique Invaders ($(date -u +%Y-%m-%d))"
            git push
            echo "✓ Données Invaders mises à jour et poussées."
          fi
